<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, initial-scale=1.0">
  <script>
    (function() {
      var dw = 393;
      var sw = Math.min(screen.width, screen.height);
      if (sw > 0 && sw !== dw) {
        document.querySelector('meta[name="viewport"]').content =
          'width=' + dw + ', initial-scale=' + (sw / dw).toFixed(4);
      }
    })();
  </script>
  <title>mori — ep. 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: #d9d9d9; overflow-x: hidden; overscroll-behavior-y: none; }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      width: 393px;
      margin: 0 auto;
      background: #f5f5f5;
      color: #1a1a1a;
      overflow-x: hidden;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    /* ── Product TopNav ── */
    .top-nav {
      position: sticky;
      top: 0;
      width: 100%;
      height: 56px;
      background: #fff;
      border-bottom: 0.5px solid #e1e1e1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      z-index: 100;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      opacity: 0.7;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .nav-icon.back img {
      transform: rotate(180deg);
    }

    /* ── 타이틀 섹션 ── */
    .title-section {
      background: #fff;
      padding: 16px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .ep-title {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      line-height: 1;
      width: 288px;
    }
    .ep-subtitle {
      font-size: 14px;
      font-weight: 500;
      color: #5a5a5a;
      line-height: 1;
      width: 288px;
    }

    /* ── 스토어 목록 ── */
    .store-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 16px 0;
    }

    .store-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 스토어 헤더: 이름+위치 + 화살표 */
    .store-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .store-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .store-name {
      font-size: 20px;
      font-weight: 500;
      color: #000;
      line-height: 1;
      white-space: nowrap;
    }
    .store-meta {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .store-meta span {
      font-size: 14px;
      font-weight: 500;
      color: #5a5a5a;
      white-space: nowrap;
    }
    .meta-dot {
      width: 3px;
      height: 3px;
      flex-shrink: 0;
    }
    .store-arrow {
      width: 24px;
      height: 24px;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .store-arrow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 갤러리: 3개 이미지 */
    .store-gallery {
      display: flex;
      gap: 4px;
      align-items: stretch;
      width: 361px;
    }
    .gallery-img {
      width: 153px;
      height: 153px;
      flex-shrink: 0;
      background: #e3e3e3;
      overflow: hidden;
    }
    .gallery-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-img:first-child {
      border-radius: 12px 0 0 12px;
    }
    .gallery-img:last-child {
      border-radius: 0 12px 12px 0;
    }
  </style>
</head>
<body>

<!-- 상단 네비 -->
<div class="top-nav">
  <div class="nav-left">
    <div class="nav-icon back" onclick="history.back()">
      <img src="assets/icon_back.png" alt="뒤로">
    </div>
    <div class="nav-icon" onclick="location.href='home.html'" style="cursor:pointer;">
      <img src="assets/Icon_Arrow 2.svg" alt="홈">
    </div>
  </div>
  <div class="nav-icon">
    <img src="assets/Icon_Arrow 3.svg" alt="공유">
  </div>
</div>

<!-- 타이틀 -->
<div class="title-section">
  <div class="ep-title">ep. 2<br>너를 닮은 케이크 한 조각</div>
  <div class="ep-subtitle">소중한 기억을 남기기 위한 작은 기념비처럼.<br>너와 나의 이야기를, 이 케이크 한 조각에 담았어요.</div>
</div>

<!-- 스토어 목록 -->
<div class="store-list">

  <!-- 미소바케카케 -->
  <div class="store-card" onclick="location.href='store.html'" style="cursor:pointer;">
    <div class="store-header">
      <div class="store-info">
        <div class="store-name">미소바케카케</div>
        <div class="store-meta">
          <span>서울 마포구</span>
          <img class="meta-dot" src="assets/dot_sep.svg" alt="">
          <span>케이크/디저트</span>
        </div>
      </div>
      <div class="store-arrow"><img src="assets/icon_arrow.png" alt=""></div>
    </div>
    <div class="store-gallery">
      <div class="gallery-img"><img src="assets/img3.png" alt=""></div>
      <div class="gallery-img"><img src="assets/store1_img1.png" alt=""></div>
      <div class="gallery-img"><img src="assets/store1_img2.png" alt=""></div>
    </div>
  </div>

  <!-- 우이필드 -->
  <div class="store-card" onclick="location.href='store.html'" style="cursor:pointer;">
    <div class="store-header">
      <div class="store-info">
        <div class="store-name">우이필드</div>
        <div class="store-meta">
          <span>서울 용산구</span>
          <img class="meta-dot" src="assets/dot_sep.svg" alt="">
          <span>케이크/디저트</span>
        </div>
      </div>
      <div class="store-arrow"><img src="assets/icon_arrow.png" alt=""></div>
    </div>
    <div class="store-gallery">
      <div class="gallery-img"><img src="assets/banner_right.png" alt=""></div>
      <div class="gallery-img"><img src="assets/store2_img1.png" alt=""></div>
      <div class="gallery-img"><img src="assets/store2_img2.png" alt=""></div>
    </div>
  </div>

  <!-- 분바렌도 -->
  <div class="store-card" onclick="location.href='store.html'" style="cursor:pointer;">
    <div class="store-header">
      <div class="store-info">
        <div class="store-name">분바렌도</div>
        <div class="store-meta">
          <span>서울 용산구</span>
          <img class="meta-dot" src="assets/dot_sep.svg" alt="">
          <span>케이크/디저트</span>
        </div>
      </div>
      <div class="store-arrow"><img src="assets/icon_arrow.png" alt=""></div>
    </div>
    <div class="store-gallery">
      <div class="gallery-img"><img src="assets/banner_left.png" alt=""></div>
      <div class="gallery-img"><img src="assets/img5.png" alt=""></div>
      <div class="gallery-img"><img src="assets/store3_img2.png" alt=""></div>
    </div>
  </div>

</div>

</body>
</html>
