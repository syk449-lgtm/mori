<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mori admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .login { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: #fff; padding: 40px; border-radius: 12px; width: 320px; }
    .login-box h2 { margin-bottom: 20px; font-size: 20px; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 24px; margin-bottom: 32px; }
    .form-box { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 32px; }
    .form-box h2 { font-size: 16px; margin-bottom: 16px; color: #555; }
    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus, select:focus { border-color: #1a1a1a; }
    .preview-box { background: #f9f9f9; border-radius: 8px; padding: 16px; margin-bottom: 12px; display: none; }
    .preview-box img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; float: left; margin-right: 12px; }
    .preview-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .preview-domain { font-size: 12px; color: #888; }
    .clearfix::after { content: ''; display: block; clear: both; }
    button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #1a1a1a; color: #fff; width: 100%; margin-top: 4px; height: 42px; }
    .btn-preview { background: #f0f0f0; color: #1a1a1a; }
    .btn-delete { background: none; border: 1px solid #ddd; color: #999; padding: 6px 12px; font-size: 12px; }
    .btn-delete:hover { border-color: #ff4444; color: #ff4444; }
    .list-box { background: #fff; border-radius: 12px; padding: 24px; }
    .list-box h2 { font-size: 16px; margin-bottom: 16px; color: #555; }
    .item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .item:last-child { border-bottom: none; }
    .item img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #eee; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .ep-badge { display: inline-block; background: #1a1a1a; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-right: 6px; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 32px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .ep-row { display: flex; align-items: center; gap: 10px; }
    .ep-label { font-size: 13px; font-weight: 600; color: #555; min-width: 40px; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login" id="loginScreen">
  <div class="login-box">
    <h2>mori admin</h2>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn-primary" style="margin-top:12px;" onclick="checkPw()">로그인</button>
  </div>
</div>

<!-- 어드민 -->
<div class="container" id="adminScreen" style="display:none;">
  <h1>mori admin</h1>

  <div class="form-box">
    <h2>상품 추가</h2>
    <div class="row">
      <input type="text" id="urlInput" placeholder="상품 URL 붙여넣기" style="flex:3;">
      <select id="epSelect" style="flex:1; min-width:90px;">
        <option value="1">ep. 1</option>
        <option value="2">ep. 2</option>
        <option value="3">ep. 3</option>
        <option value="4">ep. 4</option>
      </select>
      <button class="btn-preview" onclick="previewUrl()">미리보기</button>
    </div>

    <div class="preview-box clearfix" id="previewBox">
      <img id="previewImg" src="" alt="">
      <div class="preview-title" id="previewTitle"></div>
      <div class="preview-domain" id="previewDomain"></div>
    </div>

    <button class="btn-primary" onclick="addItem()">추가하기</button>
  </div>

  <!-- 에피소드 제목 -->
  <div class="form-box">
    <h2>에피소드 제목</h2>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="ep-row"><span class="ep-label">ep. 1</span><input type="text" id="epTitle1" placeholder="ep. 1 제목"></div>
      <div class="ep-row"><span class="ep-label">ep. 2</span><input type="text" id="epTitle2" placeholder="ep. 2 제목"></div>
      <div class="ep-row"><span class="ep-label">ep. 3</span><input type="text" id="epTitle3" placeholder="ep. 3 제목"></div>
      <div class="ep-row"><span class="ep-label">ep. 4</span><input type="text" id="epTitle4" placeholder="ep. 4 제목"></div>
    </div>
    <button class="btn-primary" style="margin-top:12px;" onclick="saveEpisodes()">저장하기</button>
  </div>

  <!-- 배너 관리 -->
  <div class="form-box">
    <h2>배너 추가</h2>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <input type="text" id="bannerImg" placeholder="이미지 URL (예: assets/banner_main.png)">
      <input type="text" id="bannerTitle" placeholder="배너 제목 (\n으로 줄바꿈)">
      <input type="text" id="bannerSubtitle" placeholder="서브타이틀">
      <input type="text" id="bannerLink" placeholder="클릭 시 이동할 URL (없으면 비워두기)">
      <input type="number" id="bannerOrder" placeholder="순서 (0부터)" value="0" style="width:120px;">
    </div>
    <button class="btn-primary" style="margin-top:12px;" onclick="addBanner()">배너 추가</button>
  </div>

  <div class="list-box" style="margin-bottom:32px;">
    <h2>등록된 배너</h2>
    <div id="bannerList"><div class="empty">로딩중...</div></div>
  </div>

  <div class="list-box">
    <h2>등록된 상품</h2>
    <div id="itemList"><div class="empty">로딩중...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://arrnybkpgqeecwgdcbdi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFycm55YmtwZ3FlZWN3Z2RjYmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTc3MTEsImV4cCI6MjA5Nzk3MzcxMX0.fI_S3ffw6FPYkGjiYuqDyXLrgixRTq7KdbAieSNvrLA';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
const OG_API = 'https://mori-silk.vercel.app/api/og';
const ADMIN_PW = 'mori2025';

let ogCache = null;

function checkPw() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadList();
    loadEpisodes();
    loadBanners();
  } else {
    alert('비밀번호가 틀렸어요.');
  }
}

async function previewUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  const box = document.getElementById('previewBox');
  box.style.display = 'block';
  document.getElementById('previewTitle').textContent = '로딩중...';
  document.getElementById('previewDomain').textContent = '';
  document.getElementById('previewImg').src = '';

  try {
    const res = await fetch(OG_API + '?url=' + encodeURIComponent(url));
    const og = await res.json();
    ogCache = og;
    document.getElementById('previewImg').src = og.image || '';
    document.getElementById('previewTitle').textContent = og.title || '(제목 없음)';
    document.getElementById('previewDomain').textContent = new URL(url).hostname.replace('www.', '');
  } catch (e) {
    document.getElementById('previewTitle').textContent = '미리보기 실패';
  }
}

async function addItem() {
  const url = document.getElementById('urlInput').value.trim();
  const ep = parseInt(document.getElementById('epSelect').value);
  if (!url) return alert('URL을 입력해주세요.');
  if (!ogCache) await previewUrl();

  const body = {
    url,
    ep,
    title: ogCache?.title || '',
    image: ogCache?.image || ''
  };

  const res = await fetch(SUPABASE_URL + '/rest/v1/stores', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    showToast('추가됐어요!');
    document.getElementById('urlInput').value = '';
    document.getElementById('previewBox').style.display = 'none';
    ogCache = null;
    loadList();
  } else {
    alert('추가 실패: ' + await res.text());
  }
}

async function loadEpisodes() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/episodes?select=*&order=ep.asc', { headers: SB_HEADERS });
  const eps = await res.json();
  eps.forEach(e => {
    const input = document.getElementById('epTitle' + e.ep);
    if (input) input.value = e.title || '';
  });
}

async function saveEpisodes() {
  const updates = [1, 2, 3, 4].map(ep => ({
    ep,
    title: document.getElementById('epTitle' + ep)?.value || ''
  }));
  for (const upd of updates) {
    await fetch(SUPABASE_URL + '/rest/v1/episodes?ep=eq.' + upd.ep, {
      method: 'PATCH',
      headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ title: upd.title })
    });
  }
  showToast('저장됐어요!');
}

async function loadBanners() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/banners?select=*&order=order_num.asc', { headers: SB_HEADERS });
  const items = await res.json();
  const list = document.getElementById('bannerList');
  if (!items.length) { list.innerHTML = '<div class="empty">등록된 배너가 없어요.</div>'; return; }
  list.innerHTML = items.map(b => `
    <div class="item" id="banner-${b.id}">
      <img src="${b.img_url}" alt="" onerror="this.style.background='#eee'" style="width:56px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;">
      <div class="item-info">
        <div class="item-title">${b.title || '—'}</div>
        <div class="item-meta">${b.subtitle || ''} · 순서 ${b.order_num}</div>
      </div>
      <button class="btn-delete" onclick="deleteBanner(${b.id})">삭제</button>
    </div>
  `).join('');
}

async function addBanner() {
  const img_url = document.getElementById('bannerImg').value.trim();
  const title = document.getElementById('bannerTitle').value.trim();
  const subtitle = document.getElementById('bannerSubtitle').value.trim();
  const link_url = document.getElementById('bannerLink').value.trim();
  const order_num = parseInt(document.getElementById('bannerOrder').value) || 0;
  if (!img_url) return alert('이미지 URL을 입력해주세요.');
  const res = await fetch(SUPABASE_URL + '/rest/v1/banners', {
    method: 'POST',
    headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ img_url, title, subtitle, link_url: link_url || null, order_num })
  });
  if (res.ok) {
    showToast('배너 추가됐어요!');
    ['bannerImg','bannerTitle','bannerSubtitle','bannerLink'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('bannerOrder').value = '0';
    loadBanners();
  } else {
    alert('추가 실패: ' + await res.text());
  }
}

async function deleteBanner(id) {
  if (!confirm('배너를 삭제할까요?')) return;
  await fetch(SUPABASE_URL + '/rest/v1/banners?id=eq.' + id, { method: 'DELETE', headers: SB_HEADERS });
  document.getElementById('banner-' + id)?.remove();
  showToast('삭제됐어요.');
}

async function loadList() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/stores?select=*&order=created_at.desc', {
    headers: SB_HEADERS
  });
  const items = await res.json();
  const list = document.getElementById('itemList');

  if (!items.length) {
    list.innerHTML = '<div class="empty">등록된 상품이 없어요.</div>';
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="item" id="item-${item.id}">
      <img src="${item.image || ''}" alt="" onerror="this.style.background='#eee'">
      <div class="item-info">
        <div class="item-title"><span class="ep-badge">ep.${item.ep}</span>${item.title || item.url}</div>
        <div class="item-meta">${new URL(item.url).hostname.replace('www.','')}</div>
      </div>
      <button class="btn-delete" onclick="deleteItem(${item.id})">삭제</button>
    </div>
  `).join('');
}

async function deleteItem(id) {
  if (!confirm('삭제할까요?')) return;
  await fetch(SUPABASE_URL + '/rest/v1/stores?id=eq.' + id, {
    method: 'DELETE',
    headers: SB_HEADERS
  });
  document.getElementById('item-' + id)?.remove();
  showToast('삭제됐어요.');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
